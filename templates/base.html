<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FDA Drug Approvals{% endblock %}</title>
    <style>
        :root {
            --teal: #0d9488;
            --teal-dark: #0f766e;
            --orchid: #a855f7;
            --orchid-dark: #9333ea;
            --bg: #ffffff;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e5e7eb;
            --surface: #f9fafb;
        }
        [data-theme="dark"] {
            --bg: #111827;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --border: #374151;
            --surface: #1f2937;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
        }
        /* Badge styles — shared across all pages */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            white-space: nowrap;
        }
        .badge-new-drug {
            background: #ccfbf1;
            color: #0f766e;
        }
        [data-theme="dark"] .badge-new-drug {
            background: #134e4a;
            color: #5eead4;
        }
        .badge-new-indication {
            background: #f3e8ff;
            color: #7c3aed;
        }
        [data-theme="dark"] .badge-new-indication {
            background: #3b0764;
            color: #d8b4fe;
        }
    </style>
    <link rel="stylesheet" href="{{ root_path or '' }}css/custom.css">
</head>
<body>
    <header>
        <div class="header-row">
            <div class="header-title">
                <h1><a href="{{ root_path or '' }}index.html" style="text-decoration:none;color:inherit;">FDA Drug Approvals</a></h1>
                <p>Last updated: {{ last_updated }}</p>
            </div>
            <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                <span class="theme-icon-light">🌙</span>
                <span class="theme-icon-dark" style="display:none">☀️</span>
            </button>
        </div>
    </header>
    <main{% block main_attrs %}{% endblock %}>{% block content %}{% endblock %}</main>
    <footer>

    </footer>
    <script src="{{ root_path or '' }}js/list.min.js"></script>
    <script src="{{ root_path or '' }}js/main.js"></script>
</body>
</html>
